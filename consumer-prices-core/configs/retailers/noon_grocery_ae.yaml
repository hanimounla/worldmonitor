retailer:
  slug: noon_grocery_ae
  name: Noon Grocery UAE
  marketCode: ae
  currencyCode: AED
  adapter: exa-search
  baseUrl: https://www.noon.com
  enabled: true

  acquisition:
    provider: exa
    searchQueryTemplate: "{canonicalName} grocery fresh food {currency} {market}"

  rateLimit:
    requestsPerMinute: 10
    maxConcurrency: 1
    delayBetweenRequestsMs: 6000

  discovery:
    mode: search
    maxPages: 20
    seeds: []
