name: Contributor Trust

on:
  pull_request_target:
    types: [opened, reopened]

jobs:
  check:
    # Skip for repo members/owners/collaborators
    if: |
      github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR' ||
      github.event.pull_request.author_association == 'FIRST_TIMER' ||
      github.event.pull_request.author_association == 'CONTRIBUTOR' ||
      github.event.pull_request.author_association == 'NONE'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Check contributor trust
        id: brin
        run: |
          AUTHOR="${{ github.event.pull_request.user.login }}"
          RESPONSE=$(curl -sf "https://api.brin.sh/contributor/${AUTHOR}" || echo '{}')
          VERDICT=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('verdict','unknown'))")
          echo "verdict=$VERDICT" >> "$GITHUB_OUTPUT"

      - name: Apply trust label
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        env:
          BRIN_VERDICT: ${{ steps.brin.outputs.verdict }}
        with:
          script: |
            const verdict = process.env.BRIN_VERDICT || 'unknown';
            const label = `trust:${verdict}`;
            const validLabels = ['trust:safe', 'trust:caution', 'trust:suspicious', 'trust:dangerous'];
            if (!validLabels.includes(label)) return;

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              labels: [label],
            });
